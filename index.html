<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Linux Hub is a custom proxy search browser built on the Toro runtime backend."
    />
    <title>Linux Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (typeof SharedWorker === 'undefined') {
        window.SharedWorker = function SharedWorkerPolyfill(url) {
          var worker = new Worker(url);
          worker.start = function () {};
          this.port = worker;
        };
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
